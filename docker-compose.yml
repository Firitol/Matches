version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ethiomatch-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: ethiomatch
    ports:
      - "5432:5432"
    volumes:
      - ethiomatch_data:/var/lib/postgresql/data

volumes:
  ethiomatch_data: